server:
  port: 8080 # 🌟 DISESUAIKAN BIAR PAS SAMA PORT RENDER LU
  address: 0.0.0.0
  http2:
    enabled: false
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - TV               # 🌟 INI YANG BENER buat OAuth, ganti dari TVHTML5
      - WEB               # fallback solid, support search/playlist/mix
      - ANDROID_VR        # fallback
      - TVHTML5_SIMPLY    # fallback
    oauth:
      enabled: true
      refreshToken: "${YOUTUBE_REFRESH_TOKEN}"
      skipInitialization: false
  lavasrc:
    providers:
      - 'spsearch:"%ISRC%"'   # 🌟 Spotify dulu buat ISRC match
      - "spsearch:%QUERY%"    # 🌟 Spotify jadi prioritas utama
      - "scsearch:%QUERY%"    # SoundCloud kedua
      - "ytsearch:%QUERY%"    # YouTube paling terakhir, cuma fallback
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false      # 🌟 GANTI JADI FALSE (Biar gak bentrok sama youtube-plugin)
      vkmusic: false
      tidal: false
      qobuz: false
      ytdlp: false        # 🌟 GANTI JADI FALSE (Ini yang bikin NullPointerException/Crash bray!)
      jiosaavn: false
    lyrics-sources:
      spotify: false
      deezer: false
      youtube: true
      yandexmusic: false
      vkmusic: false
      lrcLib: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"      # 🌟 ISI INI, jangan biarin kosong
      clientSecret: "${SPOTIFY_CLIENT_SECRET}" # 🌟 ISI INI JUGA
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: false
      localFiles: false
      preferPartnerApi: false
      preferV1SearchApi: false
    youtube:
      countryCode: "US"
      language: "en"
lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      snapshot: false
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      snapshot: false
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasearch:lavasearch-plugin:1.0.0"
      snapshot: false
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_PASSWORD}" # 🌟 TETEP AMAN AMBIL DARI ENV VARIABLE RENDER
    sources:
      youtube: false # 🌟 WAJIB FALSE BIAR DI-HANDLE SAMA PLUGIN DI ATAS
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
      nico: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: false
    soundcloudSearchEnabled: true
    gc-warnings: true
metrics:
  prometheus:
    enabled: false
    endpoint: /metrics
sentry:
  dsn: ""
  environment: "production"
logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
    lavalink.server.io.WebSocket: DEBUG
    lavalink.server.player: DEBUG
    dev.lavalink.youtube: DEBUG
    dev.lavalink.youtube.http: DEBUG
    dev.lavalink.youtube.cipher: DEBUG
    com.sedmelluq.discord.lavaplayer: DEBUG
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 7
